mutation CreateWebhooks($input: CreateWebhooksInput!) {
  createWebhooks(input: $input) {
    priceWebhooks {
      alertRecurrence
      bucketId
      bucketSortkey
      callbackUrl
      conditions {
        ... on PriceEventWebhookCondition {
          priceNetworkId: networkId {
            eq
          }
          priceUsd {
            eq
            gt
            gte
            lt
            lte
          }
          priceTokenAddress: tokenAddress {
            eq
          }
        }
        ... on RawTransactionWebhookCondition {
          from {
            eq
          }
          ignoreTokenPairEvents
          input {
            contains
            notContains
          }
          networkId {
            oneOf
          }
          to {
            eq
          }
          toOrFrom {
            eq
          }
        }
        ... on TokenPairEventWebhookCondition {
          eventType {
            oneOf
          }
          exchangeAddress {
            eq
          }
          maker {
            eq
          }
          networkId {
            oneOf
          }
          pairAddress {
            eq
          }
          swapValue {
            eq
            gt
            gte
            lt
            lte
          }
          tokenAddress {
            eq
          }
        }
      }
      created
      groupId
      id
      name
      publishingType
      retrySettings {
        maxRetries
        maxRetryDelay
        maxTimeElapsed
        minRetryDelay
      }
      status
      webhookType
    }
    rawTransactionWebhooks {
      alertRecurrence
      bucketId
      bucketSortkey
      callbackUrl
      conditions {
        ... on PriceEventWebhookCondition {
          priceEventNetworkId: networkId {
            eq
          }
          priceUsd {
            eq
            gt
            gte
            lt
            lte
          }
          priceEventTokenAddress: tokenAddress {
            eq
          }
        }
        ... on RawTransactionWebhookCondition {
          from {
            eq
          }
          ignoreTokenPairEvents
          input {
            contains
            notContains
          }
          networkId {
            oneOf
          }
          to {
            eq
          }
          toOrFrom {
            eq
          }
        }
        ... on TokenPairEventWebhookCondition {
          eventType {
            oneOf
          }
          exchangeAddress {
            eq
          }
          maker {
            eq
          }
          networkId {
            oneOf
          }
          pairAddress {
            eq
          }
          swapValue {
            eq
            gt
            gte
            lt
            lte
          }
          tokenAddress {
            eq
          }
        }
      }
      created
      groupId
      id
      name
      publishingType
      retrySettings {
        maxRetries
        maxRetryDelay
        maxTimeElapsed
        minRetryDelay
      }
      status
      webhookType
    }
    tokenPairEventWebhooks {
      alertRecurrence
      bucketId
      bucketSortkey
      callbackUrl
      conditions {
        ... on PriceEventWebhookCondition {
          priceEventNetworkId: networkId {
            eq
          }
          priceUsd {
            eq
            gt
            gte
            lt
            lte
          }
          priceEventTokenAddress: tokenAddress {
            eq
          }
        }
        ... on RawTransactionWebhookCondition {
          from {
            eq
          }
          ignoreTokenPairEvents
          input {
            contains
            notContains
          }
          networkId {
            oneOf
          }
          to {
            eq
          }
          toOrFrom {
            eq
          }
        }
        ... on TokenPairEventWebhookCondition {
          eventType {
            oneOf
          }
          exchangeAddress {
            eq
          }
          maker {
            eq
          }
          networkId {
            oneOf
          }
          pairAddress {
            eq
          }
          swapValue {
            eq
            gt
            gte
            lt
            lte
          }
          tokenAddress {
            eq
          }
        }
      }
      created
      groupId
      id
      name
      publishingType
      retrySettings {
        maxRetries
        maxRetryDelay
        maxTimeElapsed
        minRetryDelay
      }
      status
      webhookType
    }
    predictionMarketMetricsEventWebhooks {
      alertRecurrence
      bucketId
      bucketSortkey
      callbackUrl
      conditions {
        ... on PredictionMarketMetricsEventWebhookCondition {
          marketId {
            eq
          }
          market {
            ...PredictionMarketMetricsMarketConditionFields
          }
          outcome0 {
            ...PredictionMarketMetricsOutcomeConditionFields
          }
          outcome1 {
            ...PredictionMarketMetricsOutcomeConditionFields
          }
          anyOutcome {
            ...PredictionMarketMetricsOutcomeConditionFields
          }
        }
        ... on PriceEventWebhookCondition {
          priceEventNetworkId: networkId {
            eq
          }
          priceUsd {
            eq
            gt
            gte
            lt
            lte
          }
          priceEventTokenAddress: tokenAddress {
            eq
          }
        }
        ... on RawTransactionWebhookCondition {
          from {
            eq
          }
          ignoreTokenPairEvents
          input {
            contains
            notContains
          }
          networkId {
            oneOf
          }
          to {
            eq
          }
          toOrFrom {
            eq
          }
        }
        ... on TokenPairEventWebhookCondition {
          eventType {
            oneOf
          }
          exchangeAddress {
            eq
          }
          maker {
            eq
          }
          networkId {
            oneOf
          }
          pairAddress {
            eq
          }
          swapValue {
            eq
            gt
            gte
            lt
            lte
          }
          tokenAddress {
            eq
          }
        }
      }
      created
      groupId
      id
      name
      publishingType
      retrySettings {
        maxRetries
        maxRetryDelay
        maxTimeElapsed
        minRetryDelay
      }
      status
      webhookType
    }
  }
}

fragment PredictionMarketMetricsMarketConditionFields on PredictionMarketMetricsEventMarketCondition {
  min5 {
    ...WindowedPredictionMarketMetricsMarketConditionFields
  }
  hour1 {
    ...WindowedPredictionMarketMetricsMarketConditionFields
  }
  hour4 {
    ...WindowedPredictionMarketMetricsMarketConditionFields
  }
  hour12 {
    ...WindowedPredictionMarketMetricsMarketConditionFields
  }
  day1 {
    ...WindowedPredictionMarketMetricsMarketConditionFields
  }
  week1 {
    ...WindowedPredictionMarketMetricsMarketConditionFields
  }
}

fragment WindowedPredictionMarketMetricsMarketConditionFields on WindowedPredictionMarketMetricsEventMarketCondition {
  volumeUsd {
    ...ComparisonOperatorFields
  }
  trades {
    ...ComparisonOperatorFields
  }
  volumeChange {
    ...ComparisonOperatorFields
  }
  tradesChange {
    ...ComparisonOperatorFields
  }
}

fragment PredictionMarketMetricsOutcomeConditionFields on PredictionMarketMetricsEventOutcomeCondition {
  min5 {
    ...WindowedPredictionMarketMetricsOutcomeConditionFields
  }
  hour1 {
    ...WindowedPredictionMarketMetricsOutcomeConditionFields
  }
  hour4 {
    ...WindowedPredictionMarketMetricsOutcomeConditionFields
  }
  hour12 {
    ...WindowedPredictionMarketMetricsOutcomeConditionFields
  }
  day1 {
    ...WindowedPredictionMarketMetricsOutcomeConditionFields
  }
  week1 {
    ...WindowedPredictionMarketMetricsOutcomeConditionFields
  }
}

fragment WindowedPredictionMarketMetricsOutcomeConditionFields on WindowedPredictionMarketMetricsEventOutcomeCondition {
  price {
    ...ComparisonOperatorFields
  }
  priceChange {
    ...ComparisonOperatorFields
  }
  volumeUsd {
    ...ComparisonOperatorFields
  }
  volumeChange {
    ...ComparisonOperatorFields
  }
  trades {
    ...ComparisonOperatorFields
  }
  tradesChange {
    ...ComparisonOperatorFields
